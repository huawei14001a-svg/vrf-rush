<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Морской Бой</title>
<script src="https://telegram.org/js/games.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;
  background:#e8f4fc;
  font-family:-apple-system,'Segoe UI',system-ui,sans-serif;
  overflow:hidden;touch-action:none;user-select:none;
  -webkit-font-smoothing:antialiased;
}

/* ── Screens ── */
.sc{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;overflow:hidden}
.sc.off{display:none}

/* ══ START ══ */
#ss{justify-content:center;gap:8px;padding:16px;background:linear-gradient(160deg,#dbeafe,#e0f2fe)}
.logo-big{font-size:56px;line-height:1}
.t1{font-size:26px;font-weight:900;color:#1e40af;letter-spacing:1.5px}
.t2{font-size:13px;color:#64748b}
.info-box{
  background:#fff;border-radius:12px;border:1px solid #bfdbfe;
  padding:12px 16px;font-size:13px;color:#334155;line-height:1.8;
  text-align:center;width:100%;max-width:330px;
}
.info-box b{color:#1d4ed8}
.info-box .red{color:#dc2626}
.play-btn{
  background:linear-gradient(135deg,#1d4ed8,#2563eb);
  color:#fff;border:none;border-radius:40px;
  padding:13px 48px;font-size:17px;font-weight:700;
  cursor:pointer;letter-spacing:.5px;margin-top:4px;
  box-shadow:0 4px 16px rgba(37,99,235,.35);
  width:100%;max-width:260px;
}
.play-btn:active{transform:scale(.97)}

/* ══ PLACE ══ */
#sp{background:linear-gradient(160deg,#f0f9ff,#e8f4fc);padding:8px;align-items:stretch}
.pbar{
  display:flex;align-items:center;gap:6px;
  background:#fff;border-radius:10px;border:1px solid #bfdbfe;
  padding:7px 10px;flex-shrink:0;margin-bottom:6px;
}
.pbar-info{flex:1;font-size:12px;font-weight:600;color:#1e40af}
.ico{
  background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;
  color:#1d4ed8;font-size:11px;font-weight:700;padding:6px 10px;cursor:pointer;
  white-space:nowrap;flex-shrink:0;
}
.ico:active{background:#dbeafe}

.gbox{display:flex;flex-direction:column;align-items:flex-start;flex-shrink:0}
.clabels{display:flex;padding-left:var(--ls)}
.clabels span{width:var(--cs);text-align:center;font-size:9px;color:#94a3b8;font-weight:700}
.grow{display:flex}
.rlabels{width:var(--ls);display:flex;flex-direction:column;align-items:flex-end;padding-right:2px}
.rlabels span{height:var(--cs);display:flex;align-items:center;font-size:9px;color:#94a3b8;font-weight:700}
.grid{
  display:grid;
  grid-template-columns:repeat(10,var(--cs));
  grid-template-rows:repeat(10,var(--cs));
  border:2px solid #93c5fd;border-radius:4px;
  box-shadow:0 2px 8px rgba(37,99,235,.12);
}

/* cells */
.c{
  width:var(--cs);height:var(--cs);
  background:#dbeafe;
  border:1px solid rgba(147,197,253,.45);
  cursor:crosshair;position:relative;
}
.c.ship{background:#1e40af;border-color:#1d4ed8}
.c.pv{background:rgba(34,197,94,.3);border-color:#22c55e}
.c.pi{background:rgba(239,68,68,.25);border-color:#ef4444}
.c.hit{background:#fecaca;border-color:#f87171;animation:phit .35s ease-out}
.c.miss{background:#bfdbfe;border-color:#93c5fd}
.c.sunk{background:#fca5a5!important;border-color:#ef4444!important}
.c.hit::after,.c.sunk::after{
  content:'✕';position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:calc(var(--cs)*.58);font-weight:900;color:#dc2626;
}
.c.miss::after{
  content:'';position:absolute;
  top:50%;left:50%;transform:translate(-50%,-50%);
  width:30%;height:30%;border-radius:50%;
  background:#60a5fa;
}
@keyframes phit{0%{transform:scale(1.2)}100%{transform:scale(1)}}

/* ship list */
.slist{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;flex-shrink:0;margin-top:4px}
.sbadge{
  display:flex;align-items:center;gap:2px;
  background:#fff;border:1px solid #bfdbfe;border-radius:7px;
  padding:4px 7px;font-size:10px;color:#64748b;
}
.sbadge.done{opacity:.45}
.sbk{width:9px;height:9px;border-radius:2px;background:#1e40af;margin-right:1px}
.sbadge.done .sbk{background:#94a3b8}
.go-btn{
  background:linear-gradient(135deg,#1d4ed8,#2563eb);
  color:#fff;border:none;border-radius:40px;
  padding:11px 36px;font-size:15px;font-weight:700;
  cursor:pointer;flex-shrink:0;margin-top:6px;
  box-shadow:0 3px 12px rgba(37,99,235,.3);
  width:100%;max-width:240px;
}
.go-btn:disabled{opacity:.4;pointer-events:none}
.go-btn:active{transform:scale(.97)}

/* ══ BATTLE ══ */
#sb{background:#f0f9ff;padding:6px;align-items:stretch;gap:4px}
.hud{
  display:flex;align-items:center;justify-content:space-between;
  background:#fff;border:1px solid #bfdbfe;border-radius:10px;
  padding:7px 12px;flex-shrink:0;
}
.hfleet{display:flex;gap:3px;align-items:center}
.hship{height:8px;border-radius:2px;background:#1e40af;transition:background .3s}
.hship.sunk{background:#f87171}
.hlbl{font-size:10px;color:#94a3b8;margin-right:4px}
.hturn{
  font-size:12px;font-weight:700;padding:4px 10px;border-radius:8px;
  background:#dbeafe;color:#1d4ed8;transition:all .25s;
}
.hturn.ai{background:#fee2e2;color:#dc2626}

.glbl{font-size:10px;font-weight:700;color:#64748b;letter-spacing:.7px;flex-shrink:0;margin-bottom:2px;padding-left:var(--ls)}

.msgbar{
  flex-shrink:0;height:26px;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#1d4ed8;
}
.msgbar.red{color:#dc2626}

/* ══ RESULT ══ */
#sr{justify-content:center;gap:10px;padding:20px;background:linear-gradient(160deg,#dbeafe,#e0f2fe)}
.rico{font-size:60px;line-height:1}
.rtitle{font-size:28px;font-weight:900;color:#1e40af}
.rtitle.lose{color:#dc2626}
.vrfpill{
  background:linear-gradient(135deg,#1d4ed8,#2563eb);
  color:#fff;font-weight:800;font-size:17px;
  padding:8px 28px;border-radius:30px;
  box-shadow:0 4px 14px rgba(37,99,235,.35);
}
.stat{
  display:flex;justify-content:space-between;
  padding:8px 0;border-bottom:1px solid #e2e8f0;
  font-size:13px;color:#475569;width:100%;max-width:300px;
}
.stat:last-child{border-bottom:none}
.sv{font-weight:700;color:#1d4ed8}
</style>
</head>
<body>

<!-- START -->
<div id="ss" class="sc">
  <div class="logo-big">⚓</div>
  <div class="t1">МОРСКОЙ БОЙ</div>
  <div class="t2">Потопи флот противника!</div>
  <div class="info-box">
    <b>████ Линкор ×1</b><br>
    <b>███ Крейсер ×2 &nbsp; ██ Эсминец ×3</b><br>
    <b>■ Катер ×4</b><br>
    <span class="red">💣 Попадание = ход снова &nbsp;·&nbsp; 3 промаха подряд = AI</span>
  </div>
  <button class="play-btn" onclick="G.toPlace()">▶ НАЧАТЬ</button>
</div>

<!-- PLACE -->
<div id="sp" class="sc off">
  <div class="pbar">
    <div class="pbar-info" id="pinfo">—</div>
    <button class="ico" onclick="G.rotate()">↺</button>
    <button class="ico" onclick="G.rndAll()">🔀 Авто</button>
  </div>
  <div class="gbox" id="pgbox">
    <div class="clabels" id="pcl"></div>
    <div class="grow">
      <div class="rlabels" id="prl"></div>
      <div class="grid" id="pgrid"></div>
    </div>
  </div>
  <div class="slist" id="slist"></div>
  <button class="go-btn" id="gobtn" onclick="G.toBattle()" disabled>⚔️ В БОЙ!</button>
</div>

<!-- BATTLE -->
<div id="sb" class="sc off">
  <div class="hud">
    <div>
      <div class="hlbl">ВАШ ФЛОТ</div>
      <div class="hfleet" id="phud"></div>
    </div>
    <div class="hturn" id="hturn">ВАШ ХОД</div>
    <div style="text-align:right">
      <div class="hlbl">ПОТОПЛЕНО</div>
      <div style="font-size:12px;font-weight:700;color:#1d4ed8" id="ehud">0/10</div>
    </div>
  </div>
  <div class="glbl">ФЛОТ ПРОТИВНИКА — НАЖМИ ЧТОБЫ СТРЕЛЯТЬ</div>
  <div class="gbox" id="egbox">
    <div class="clabels" id="ecl"></div>
    <div class="grow">
      <div class="rlabels" id="erl"></div>
      <div class="grid" id="egrid"></div>
    </div>
  </div>
  <div class="msgbar" id="msg">‎</div>
  <div class="glbl">ВАШ ФЛОТ</div>
  <div class="gbox" id="pgbox2">
    <div class="clabels" id="pcl2"></div>
    <div class="grow">
      <div class="rlabels" id="prl2"></div>
      <div class="grid" id="pgrid2"></div>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="sr" class="sc off">
  <div class="rico" id="rico">🏆</div>
  <div class="rtitle" id="rtitle">ПОБЕДА!</div>
  <div class="vrfpill" id="rvrf">💎 +0 VRF</div>
  <div class="stat"><span>Выстрелов</span><span class="sv" id="rst1">—</span></div>
  <div class="stat"><span>Точность</span><span class="sv" id="rst2">—</span></div>
  <div class="stat"><span>Потоплено</span><span class="sv" id="rst3">—</span></div>
  <div class="stat"><span>Очки</span><span class="sv" id="rst4">—</span></div>
  <button class="play-btn" onclick="G.toPlace()" style="margin-top:8px">🔄 Ещё раз</button>
</div>

<script>
'use strict';
const QS=new URLSearchParams(location.search);
const UID=QS.get('uid')||'',TOKEN=QS.get('token')||'',APIURL=QS.get('api')||'';
const PNAME=QS.get('name')?decodeURIComponent(QS.get('name')):'Адмирал';

const N=10, COLS='АБВГДЕЖЗИК';
const SIZES=[4,3,3,2,2,2,1,1,1,1];
const NAMES=['Линкор','Крейсер','Крейсер','Эсминец','Эсминец','Эсминец','Катер','Катер','Катер','Катер'];

// ── Cell sizing: fit everything on screen ────────────────
function calcSizes(){
  const VH=window.innerHeight, VW=window.innerWidth;
  // Battle overhead: hud(42)+glbl(18)+msg(26)+glbl(18)+gap(24) = 128
  const battleOH=128;
  // Remaining split 62/38 between large/small grids
  const rem=VH-battleOH;
  const L=Math.max(22,Math.min(40,Math.floor(rem*.62/10)));
  const S=Math.max(11,Math.floor(rem*.36/10));
  // Placement overhead: pbar(42)+slist(38)+btn(40)+gaps(20) = 140
  const PL=Math.max(22,Math.min(40,Math.floor((VH-140)/10)));
  const LS=Math.max(14, Math.floor(Math.min(VW,420)/10*0.42));
  return {L,S,PL,LS};
}
let {L,S,PL,LS}=calcSizes();

function applySize(cs,ls=LS){
  document.documentElement.style.setProperty('--cs',cs+'px');
  document.documentElement.style.setProperty('--ls',ls+'px');
}

// ── Board logic ──────────────────────────────────────────
function mkBoard(){return Array.from({length:N},()=>new Array(N).fill(0))}
function shipCells(r,c,sz,h){return Array.from({length:sz},(_,i)=>h?[r,c+i]:[r+i,c])}
function inB(r,c){return r>=0&&r<N&&c>=0&&c<N}
function canPlace(board,r,c,sz,h){
  const cs=shipCells(r,c,sz,h);
  for(const[sr,sc]of cs){
    if(!inB(sr,sc))return false;
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      const nr=sr+dr,nc=sc+dc;
      if(inB(nr,nc)&&board[nr][nc]===1)return false;
    }
  }
  return true;
}
function doPlace(board,fleet,r,c,sz,h,name){
  const cs=shipCells(r,c,sz,h);
  for(const[sr,sc]of cs)board[sr][sc]=1;
  fleet.push({cells:cs,size:sz,name,sunk:false});
}
function rndFleet(board,fleet){
  fleet.length=0;
  for(let r=0;r<N;r++)for(let c=0;c<N;c++)board[r][c]=0;
  for(let i=0;i<SIZES.length;i++){
    let ok=false,att=0;
    while(!ok&&att<9999){att++;
      const h=Math.random()<.5,r=Math.floor(Math.random()*N),c=Math.floor(Math.random()*N);
      if(canPlace(board,r,c,SIZES[i],h)){doPlace(board,fleet,r,c,SIZES[i],h,NAMES[i]);ok=true;}
    }
  }
}
function fireAt(board,fleet,r,c){
  if(board[r][c]===0||board[r][c]===1){
    if(board[r][c]===1){
      board[r][c]=2;
      for(const s of fleet){
        if(s.cells.some(([sr,sc])=>sr===r&&sc===c)){
          if(s.cells.every(([sr,sc])=>board[sr][sc]===2)){s.sunk=true;return'sunk';}
          return'hit';
        }
      }
    }
    board[r][c]=3;return'miss';
  }
  return'used';
}
function allSunk(fl){return fl.every(s=>s.sunk)}

// ── AI ───────────────────────────────────────────────────
let aiHits=[];
function aiPick(){
  const free=(r,c)=>inB(r,c)&&(pB[r][c]===0||pB[r][c]===1);
  if(aiHits.length>=2){
    const[r0,c0]=aiHits[0],[r1,c1]=aiHits[aiHits.length-1];
    const dr=r0===r1?0:1,dc=c0===c1?0:1;
    if(free(r1+dr,c1+dc))return[r1+dr,c1+dc];
    if(free(r0-dr,c0-dc))return[r0-dr,c0-dc];
  }
  if(aiHits.length===1){
    const[hr,hc]=aiHits[0];
    const dirs=[[-1,0],[1,0],[0,-1],[0,1]].sort(()=>Math.random()-.5);
    for(const[dr,dc]of dirs)if(free(hr+dr,hc+dc))return[hr+dr,hc+dc];
  }
  const cands=[];
  for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(free(r,c)&&(r+c)%2===0)cands.push([r,c]);
  if(!cands.length)for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(free(r,c))cands.push([r,c]);
  return cands[Math.floor(Math.random()*cands.length)];
}

// ── Grid DOM ─────────────────────────────────────────────
function buildLabels(cid,rid){
  const ce=document.getElementById(cid),re=document.getElementById(rid);
  ce.innerHTML=re.innerHTML='';
  for(let i=0;i<N;i++){
    const s=document.createElement('span');s.textContent=COLS[i];ce.appendChild(s);
    const r=document.createElement('span');r.textContent=i+1;re.appendChild(r);
  }
}
function buildGrid(id,onClick,onHover){
  const g=document.getElementById(id);g.innerHTML='';
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const d=document.createElement('div');d.className='c';d.dataset.r=r;d.dataset.c=c;
    if(onClick){
      d.addEventListener('click',()=>onClick(r,c));
      d.addEventListener('touchstart',e=>{e.preventDefault();onClick(r,c);},{passive:false});
    }
    if(onHover){
      d.addEventListener('mouseenter',()=>onHover(r,c,true));
      d.addEventListener('mouseleave',()=>onHover(r,c,false));
    }
    g.appendChild(d);
  }
}
function syncGrid(id,board,fleet,showShips,preview){
  const cells=document.getElementById(id).querySelectorAll('.c');
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const el=cells[r*N+c];el.className='c';
    const v=board[r][c];
    if(v===2){
      const sk=fleet.find(s=>s.sunk&&s.cells.some(([sr,sc])=>sr===r&&sc===c));
      el.classList.add(sk?'sunk':'hit');
    }else if(v===3){el.classList.add('miss');
    }else if(v===1&&showShips){el.classList.add('ship');}
    if(preview){
      const{cells:pc,ok}=preview;
      if(pc.some(([pr,pc2])=>pr===r&&pc2===c))el.classList.add(ok?'pv':'pi');
    }
  }
}

// ── HUD ──────────────────────────────────────────────────
function updHUD(){
  const ph=document.getElementById('phud');ph.innerHTML='';
  for(const s of pF){
    const b=document.createElement('div');
    b.className='hship'+(s.sunk?' sunk':'');
    b.style.width=(s.size*S*.75)+'px';
    ph.appendChild(b);
  }
  document.getElementById('ehud').textContent=eF.filter(s=>s.sunk).length+'/'+eF.length;
}
function setMsg(t,red=false){
  const m=document.getElementById('msg');m.textContent=t;
  m.className='msgbar'+(red?' red':'');
}
function setTurn(ai){
  const t=document.getElementById('hturn');
  t.textContent=ai?'КОМП…':'ВАШ ХОД';
  t.className='hturn'+(ai?' ai':'');
}

// ── Score/VRF ─────────────────────────────────────────────
function calcScore(won){
  const acc=totalShots>0?totalHits/totalShots:0;
  if(!won)return Math.round(sunkByP*80+acc*200);
  return Math.round(500+acc*500+Math.max(0,50-totalShots)*8);
}
function calcVRF(score,won){
  if(!won)return Math.min(10,Math.floor(score/50));
  if(score<600)return 10; if(score<800)return 20;
  if(score<1000)return 35; return 50;
}

// ── State ────────────────────────────────────────────────
let pB,eB,pF,eF,placeIdx,placeH,prevR,prevC,playerTurn,busy,gameOver;
let totalShots,totalHits,sunkByP;

// ── Screen switch ─────────────────────────────────────────
function show(id){['ss','sp','sb','sr'].forEach(s=>document.getElementById(s).classList.toggle('off',s!==id));}

// ═══════════════════════════════════════════════════
//                  GAME CONTROLLER
// ═══════════════════════════════════════════════════
const G={
  toPlace(){
    pB=mkBoard();eB=mkBoard();pF=[];eF=[];
    placeIdx=0;placeH=true;prevR=prevC=-1;
    totalShots=totalHits=sunkByP=0;
    aiHits=[];gameOver=false;busy=false;playerTurn=true;

    applySize(PL);
    buildLabels('pcl','prl');
    buildGrid('pgrid',
      (r,c)=>{
        if(placeIdx>=SIZES.length)return;
        if(canPlace(pB,r,c,SIZES[placeIdx],placeH)){
          doPlace(pB,pF,r,c,SIZES[placeIdx],placeH,NAMES[placeIdx]);
          placeIdx++;
          syncGrid('pgrid',pB,pF,true,null);
          this._updPlace();
        }
      },
      (r,c,enter)=>{prevR=enter?r:-1;prevC=enter?c:-1;this._showPrev();}
    );
    syncGrid('pgrid',pB,pF,true,null);
    this._updPlace();
    show('sp');
  },

  _showPrev(){
    if(prevR<0||placeIdx>=SIZES.length){syncGrid('pgrid',pB,pF,true,null);return;}
    const pc=shipCells(prevR,prevC,SIZES[placeIdx],placeH);
    const ok=canPlace(pB,prevR,prevC,SIZES[placeIdx],placeH);
    syncGrid('pgrid',pB,pF,true,{cells:pc,ok});
  },

  _updPlace(){
    const done=placeIdx>=SIZES.length;
    document.getElementById('pinfo').innerHTML=done
      ?'<span style="color:#16a34a;font-weight:800">✓ Все расставлены!</span>'
      :`Ставим: <b>${NAMES[placeIdx]}</b> (${SIZES[placeIdx]}) ${placeH?'→':'↓'}`;
    document.getElementById('gobtn').disabled=!done;
    // Ship list
    const sl=document.getElementById('slist');sl.innerHTML='';
    for(let i=0;i<SIZES.length;i++){
      const b=document.createElement('div');b.className='sbadge'+(i<placeIdx?' done':'');
      for(let j=0;j<SIZES[i];j++){const k=document.createElement('div');k.className='sbk';b.appendChild(k);}
      const l=document.createElement('span');l.style.cssText='font-size:9px;color:#94a3b8;margin-left:3px';
      l.textContent=NAMES[i];b.appendChild(l);sl.appendChild(b);
    }
  },

  rotate(){if(placeIdx>=SIZES.length)return;placeH=!placeH;this._updPlace();this._showPrev();},
  rndAll(){rndFleet(pB,pF);placeIdx=SIZES.length;syncGrid('pgrid',pB,pF,true,null);this._updPlace();},

  toBattle(){
    if(placeIdx<SIZES.length)return;
    rndFleet(eB,eF);
    // Build battle grids
    applySize(L);
    buildLabels('ecl','erl');
    buildGrid('egrid',(r,c)=>{if(playerTurn&&!busy&&!gameOver)this._pShoot(r,c);});
    syncGrid('egrid',eB,eF,false,null);

    applySize(S);
    buildLabels('pcl2','prl2');
    buildGrid('pgrid2',null,null);
    applySize(L);
    this._syncSmall();

    updHUD();setMsg('🎯 Выбери клетку');setTurn(false);
    show('sb');
  },

  _syncSmall(){
    applySize(S);
    syncGrid('pgrid2',pB,pF,true,null);
    applySize(L);
  },

  _pShoot(r,c){
    if(eB[r][c]===2||eB[r][c]===3)return;
    totalShots++;
    const res=fireAt(eB,eF,r,c);
    syncGrid('egrid',eB,eF,false,null);
    if(res==='miss'){
      setMsg('🌊 Мимо!');playerTurn=false;setTurn(true);updHUD();
      setTimeout(()=>this._aiTurn(),900);
    }else{
      totalHits++;
      if(res==='sunk'){sunkByP++;setMsg(`💥 Потоплен ${eF.find(s=>s.sunk&&s.cells.some(([sr,sc])=>eB[sr][sc]===2))?.name||'корабль'}!`);}
      else setMsg('💥 Попадание! Стреляй снова!');
      updHUD();
      if(allSunk(eF)){setTimeout(()=>this._end(true),500);}
    }
  },

  async _aiTurn(){
    if(gameOver)return;busy=true;
    await sleep(550);
    const pos=aiPick();if(!pos){busy=false;playerTurn=true;setTurn(false);return;}
    const[r,c]=pos;
    const res=fireAt(pB,pF,r,c);
    this._syncSmall();
    if(res==='miss'){
      setMsg('🌊 Промах компа!',false);playerTurn=true;busy=false;setTurn(false);
    }else{
      if(res==='sunk'){
        const sk=pF.find(s=>s.sunk&&s.cells.some(([sr,sc])=>sr===r&&sc===c));
        if(sk)aiHits=aiHits.filter(([hr,hc])=>!sk.cells.some(([sr,sc])=>sr===hr&&sc===hc));
        setMsg('💥 Комп потопил ваш корабль!',true);
      }else{
        aiHits.push([r,c]);setMsg('💥 Комп попал! Стреляет снова...',true);
      }
      updHUD();
      if(allSunk(pF)){busy=false;setTimeout(()=>this._end(false),500);return;}
      await sleep(700);
      if(!gameOver)this._aiTurn();return;
    }
    updHUD();
  },

  async _end(won){
    if(gameOver)return;gameOver=true;
    const sc=calcScore(won),vrf=calcVRF(sc,won);
    const acc=totalShots>0?Math.round(totalHits/totalShots*100):0;
    document.getElementById('rico').textContent=won?'🏆':'💀';
    const rt=document.getElementById('rtitle');
    rt.textContent=won?`ПОБЕДА, ${PNAME}!`:'ПОРАЖЕНИЕ...';
    rt.className=won?'rtitle':'rtitle lose';
    document.getElementById('rvrf').textContent=`💎 +${vrf} VRF`;
    document.getElementById('rst1').textContent=totalShots;
    document.getElementById('rst2').textContent=acc+'%';
    document.getElementById('rst3').textContent=sunkByP+'/'+eF.length;
    document.getElementById('rst4').textContent=sc;
    show('sr');
    if(APIURL&&TOKEN&&UID){
      try{
        const r=await fetch(APIURL,{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({token:TOKEN,uid:UID,score:sc})});
        const d=await r.json();
        if(d.ok)document.getElementById('rvrf').textContent=`💎 +${d.vrf_earned} VRF зачислено!`;
      }catch(e){}
    }
  }
};

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
</script>
